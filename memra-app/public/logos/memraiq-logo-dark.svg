<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <rect width="420" height="100" fill="#0C0A07"/>
  <!-- Spokes from center (50,50) scaled to icon space -->
  <line x1="50" y1="50" x2="50" y2="10"  stroke="#d3a062" stroke-width="2"   opacity="0.28" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="18" y2="69"  stroke="#d3a062" stroke-width="2"   opacity="0.28" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="82" y2="69"  stroke="#d3a062" stroke-width="2"   opacity="0.28" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="18" y2="31"  stroke="#d3a062" stroke-width="2"   opacity="0.16" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="82" y2="31"  stroke="#d3a062" stroke-width="2"   opacity="0.16" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="90"  stroke="#d3a062" stroke-width="2"   opacity="0.16" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="50" cy="10" r="4.5" fill="#d3a062" opacity="0.9"/>
  <circle cx="18" cy="69" r="3.5" fill="#d3a062" opacity="0.55"/>
  <circle cx="82" cy="69" r="3.5" fill="#d3a062" opacity="0.55"/>
  <circle cx="18" cy="31" r="2.8" fill="#d3a062" opacity="0.35"/>
  <circle cx="82" cy="31" r="2.8" fill="#d3a062" opacity="0.35"/>
  <circle cx="50" cy="90" r="2.8" fill="#d3a062" opacity="0.35"/>
  <!-- Center hub -->
  <circle cx="50" cy="50" r="11" fill="#d3a062"/>
  <circle cx="50" cy="50" r="4.5" fill="white" opacity="0.45"/>
  <!-- Wordmark -->
  <text x="114" y="64" font-family="Outfit, sans-serif" font-size="40" font-weight="300" fill="#F5F0E8" letter-spacing="-1">memra<tspan fill="#d3a062" font-weight="400">iq</tspan></text>
</svg>
