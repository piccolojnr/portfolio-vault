# alembic.ini — Alembic migration configuration for portfolio-vault-rag
#
# Run migrations:    rag migrate                (alembic upgrade head)
# Fresh DB:         rag migrate-fresh          (drop schema + upgrade head)
# New revision:     rag create-migration NAME  (alembic revision --autogenerate)
# Stamp existing:   rag stamp                  (alembic stamp head)

[alembic]
script_location = migrations

# Adds rag/src/ to sys.path so `import portfolio_rag` works during autogenerate.
prepend_sys_path = src

# Revision filename pattern: YYYYMMDD_slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(slug)s

# URL is set programmatically from Settings in alembic/env.py.
# Leave blank here — alembic will raise if it's missing and env.py didn't set it.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
