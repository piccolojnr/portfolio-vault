# alembic.ini — Alembic migration configuration for portfolio-vault-rag
#
# Run from the rag/ directory:
#   alembic upgrade head                        # apply all pending migrations
#   alembic downgrade -1                        # roll back one revision
#   alembic revision --autogenerate -m "name"  # scaffold a new migration
#   alembic stamp head                          # mark DB up-to-date without running
#   alembic current                             # show current revision
#   alembic history                             # list all revisions
#
# App-specific commands (rag CLI):
#   rag migrate-fresh                           # DROP schema + re-apply from scratch
#   rag seed                                    # upsert vault markdown docs into DB

[alembic]
script_location = migrations

# Adds rag/src/ to sys.path so `import portfolio_rag` works during autogenerate.
prepend_sys_path = src

# Revision filename pattern: YYYYMMDD_slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(slug)s

# URL is set programmatically from Settings in alembic/env.py.
# Leave blank here — alembic will raise if it's missing and env.py didn't set it.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
